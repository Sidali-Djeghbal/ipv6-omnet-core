[General]
network           = src.BasicNetwork
sim-time-limit    = 100s

# ── Force IPv6 only on every module ─────────────────────────────
**.hasIpv4 = false
**.hasIpv6 = true

# ── IPv6 configurator: assign global addresses, no static routes ─
*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

# ── Enable OSPFv3 on all 6 routers ──────────────────────────────
# ── OSPFv3 Configuration File ────────────────────────────────────
**.ospfv3.ospfConfig = xmldoc("ospf_config.xml")
*.r1.hasOspfv3 = true
*.r2.hasOspfv3 = true
*.r3.hasOspfv3 = true
*.r4.hasOspfv3 = true
*.r5.hasOspfv3 = true
*.r6.hasOspfv3 = true

# ── OSPFv3 timers ────────────────────────────────────────────────
**.ospfv3.helloInterval = 10s
**.ospfv3.deadInterval  = 40s

# ── TCP stack ────────────────────────────────────────────────────
**.tcp.typename = "Tcp"

# ── TCP traffic: client1 → server1 ──────────────────────────────
*.client1.numApps               = 1
*.client1.app[0].typename       = "TcpSessionApp"
*.client1.app[0].connectAddress = "server1"
*.client1.app[0].connectPort    = 1000
*.client1.app[0].tOpen          = 20s
*.client1.app[0].tClose         = 90s
*.client1.app[0].sendBytes      = 10MB

*.server1.numApps               = 1
*.server1.app[0].typename       = "TcpSinkApp"
*.server1.app[0].localPort      = 1000

# ── UDP traffic: client2 → server2 ──────────────────────────────
*.client2.numApps                   = 1
*.client2.app[0].typename           = "UdpBasicApp"
*.client2.app[0].destAddresses      = "server2"
*.client2.app[0].destPort           = 2000
*.client2.app[0].messageLength      = 1000B
*.client2.app[0].sendInterval       = 0.01s
*.client2.app[0].startTime          = 20s

*.server2.numApps               = 1
*.server2.app[0].typename       = "UdpSink"
*.server2.app[0].localPort      = 2000

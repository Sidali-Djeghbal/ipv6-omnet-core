# ============================================================
# Part III – Quality of Service (QoS) Implementation (@Team03)
# ============================================================

# ===========================================================
# [Config QoS_DiffServ_WFQ]
#
#   DiffServ with Weighted Fair Queuing (WRR scheduler).
#
#   Design rationale:
#   - UDP real-time stream → DSCP 46 (Expedited Forwarding) → queue[0]
#   - TCP bulk transfer   → DSCP 0  (Best Effort)           → queue[1]
#   - WrrScheduler weights 3:1 → UDP gets ~75% bandwidth,
#     TCP guaranteed ~25% — NO starvation (contrast with strict priority).
#   - Bottleneck set to 100 kbps locally to force observable queuing.
#     TCP_UDP_Competing baseline is NOT modified.
# ===========================================================
[Config QoS_DiffServ_WFQ]
description = "Part III: DiffServ + Weighted Fair Queuing (WRR) — no TCP starvation"
extends = TCP_UDP_Competing

# ── DSCP tagging ───────────────────────────────────────────
*.client2.app[0].dscp = 46   # UDP → Expedited Forwarding
*.client1.app[0].dscp = 0    # TCP → Best Effort

# ── Local bottleneck override (does NOT touch TCP_UDP_Competing) ──
*.r5.eth[1].datarate = 100kbps

# ── Fair scheduler at bottleneck router R5 ─────────────────
*.r5.eth[1].queue.typename             = "PriorityQueue"
*.r5.eth[1].queue.numQueues            = 2
*.r5.eth[1].queue.classifier.typename = "WrrClassifier"
*.r5.eth[1].queue.classifier.weights  = "3 1"
*.r5.eth[1].queue.scheduler.typename  = "WrrScheduler"
*.r5.eth[1].queue.scheduler.weights   = "3 1"

*.r5.eth[1].queue.queue[0].typename        = "DropTailQueue"
*.r5.eth[1].queue.queue[0].packetCapacity  = 50
*.r5.eth[1].queue.queue[1].typename        = "DropTailQueue"
*.r5.eth[1].queue.queue[1].packetCapacity  = 50

# ── UDP packet size adjusted to fit 100 kbps bottleneck ────
*.client2.app[0].messageLength = 200B

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config QoS_DiffServ_WFQ_OSPFv3]
#   Same DiffServ/WFQ scenario on OSPFv3 routing.
# ===========================================================
[Config QoS_DiffServ_WFQ_OSPFv3]
description = "Part III: DiffServ + WFQ (OSPFv3 routing)"
extends = QoS_DiffServ_WFQ

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip                  = false
*.r*.hasOspf                 = true
*.r*.ospf.ospfConfig         = xmldoc("ospfv3_config.xml")
*.r*.ospf.helloInterval      = 10s
*.r*.ospf.deadInterval       = 40s
*.r*.ospf.retransmitInterval = 5s

# ===========================================================
# [Config QoS_IntServ_RSVP]
#
#   IntServ emulation via per-flow strict priority + constrained queues.
#
#   Design rationale:
#   IntServ provides per-flow guaranteed bandwidth reservation (unlike
#   DiffServ which is per-aggregate-class). Since INET's RSVP-TE support
#   for IPv6 is limited, this config emulates the effect of two IntServ
#   service classes:
#     - queue[0]: Guaranteed Service (GS)  → UDP real-time flow
#     - queue[1]: Controlled Load (CL)     → TCP bulk flow
#
#   Strict priority IS correct here: GS traffic gets absolute precedence,
#   and the small queue[0] capacity (20 pkts) naturally bounds the UDP
#   reservation, preventing it from monopolizing indefinitely.
#   This contrasts with WFQ (Part III DiffServ) where both flows share
#   bandwidth proportionally rather than via hard per-flow reservation.
#
#   DSCP AF11 (10) used for UDP to signal Controlled-Load intent.
# ===========================================================
[Config QoS_IntServ_RSVP]
description = "Part III: IntServ emulation — per-flow GS/CL reservation at R5"
extends = TCP_UDP_Competing

# ── DSCP tagging (IntServ service class signaling) ──────────
*.client2.app[0].dscp = 10   # AF11 → Controlled Load / GS candidate
*.client1.app[0].dscp = 0    # Best Effort

# ── Local bottleneck override ───────────────────────────────
*.r5.eth[1].datarate = 100kbps

# ── Per-flow reservation queuing at R5 ─────────────────────
*.r5.eth[1].queue.typename             = "PriorityQueue"
*.r5.eth[1].queue.numQueues            = 2
*.r5.eth[1].queue.classifier.typename = "WrrClassifier"
*.r5.eth[1].queue.classifier.weights  = "3 1"

# Strict priority appropriate for IntServ Guaranteed Service
*.r5.eth[1].queue.scheduler.typename  = "PriorityScheduler"

# queue[0]: GS — small, bounded reservation (emulates RSVP bandwidth alloc)
*.r5.eth[1].queue.queue[0].typename        = "DropTailQueue"
*.r5.eth[1].queue.queue[0].packetCapacity  = 20

# queue[1]: CL/BE — larger buffer for TCP
*.r5.eth[1].queue.queue[1].typename        = "DropTailQueue"
*.r5.eth[1].queue.queue[1].packetCapacity  = 30

# ── Adjust UDP packet size ──────────────────────────────────
*.client2.app[0].messageLength = 200B

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config QoS_IntServ_RSVP_OSPFv3]
#   IntServ scenario on OSPFv3 routing.
# ===========================================================
[Config QoS_IntServ_RSVP_OSPFv3]
description = "Part III: IntServ emulation (OSPFv3 routing)"
extends = QoS_IntServ_RSVP

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip                  = false
*.r*.hasOspf                 = true
*.r*.ospf.ospfConfig         = xmldoc("ospfv3_config.xml")
*.r*.ospf.helloInterval      = 10s
*.r*.ospf.deadInterval       = 40s
*.r*.ospf.retransmitInterval = 5s


# ============================================================
# Part IV – Advanced Technologies (Option A - @Sidali-djeghbal)
# ============================================================

# ===========================================================
# [Config IPv6_Advanced_QoS]
#
#   IPv6 Advanced Features: Auto-configuration + DiffServ QoS tagging.
#   UDP tagged EF (DSCP 46), TCP tagged BE (DSCP 0).
#   WrrScheduler added at R2 bottleneck to avoid TCP starvation
#   (same fix as Part III — PriorityScheduler was missing/implicit).
# ===========================================================
[Config IPv6_Advanced_QoS]
description = "Part IV (Option A): IPv6 Advanced Features — QoS & Auto-config"
extends = TCP_UDP_Competing

# ── DSCP tagging ───────────────────────────────────────────
*.client2.app[0].dscp = 46   # UDP → Expedited Forwarding
*.client1.app[0].dscp = 0    # TCP → Best Effort

# ── QoS at bottleneck router R2 ────────────────────────────
*.r2.eth[2].queue.typename             = "PriorityQueue"
*.r2.eth[2].queue.numQueues            = 2
*.r2.eth[2].queue.classifier.typename = "WrrClassifier"
*.r2.eth[2].queue.classifier.weights  = "3 1"

# FIX: explicit WrrScheduler (was defaulting to strict priority)
*.r2.eth[2].queue.scheduler.typename  = "WrrScheduler"
*.r2.eth[2].queue.scheduler.weights   = "3 1"

*.r2.eth[2].queue.queue[0].typename        = "DropTailQueue"
*.r2.eth[2].queue.queue[0].packetCapacity  = 50
*.r2.eth[2].queue.queue[1].typename        = "DropTailQueue"
*.r2.eth[2].queue.queue[1].packetCapacity  = 50

# ── IPv6 Traffic Class / DSCP recording ────────────────────
**.ipv6.dscp:vector         = true
**.ipv6.trafficClass:vector = true

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config IPv6_Advanced_QoS_OSPFv3]
#   Part IV QoS scenario on OSPFv3 routing.
# ===========================================================
[Config IPv6_Advanced_QoS_OSPFv3]
description = "Part IV (Option A): IPv6 QoS & Auto-config (OSPFv3 routing)"
extends = IPv6_Advanced_QoS

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip                  = false
*.r*.hasOspf                 = true
*.r*.ospf.ospfConfig         = xmldoc("ospfv3_config.xml")
*.r*.ospf.helloInterval      = 10s
*.r*.ospf.deadInterval       = 40s
*.r*.ospf.retransmitInterval = 5s
[General]
network = src.BasicNetwork
sim-time-limit = 100s

# TCP Traffic: client1 -> server1
**.tcp.typename = "Tcp"
*.client1.numApps = 1
*.client1.app[0].typename = "TcpSessionApp"
*.client1.app[0].connectAddress = "server1"
*.client1.app[0].connectPort = 1000
*.client1.app[0].tOpen = 15s
*.client1.app[0].tClose = 90s
*.client1.app[0].sendBytes = 10MB

*.server1.numApps = 1
*.server1.app[0].typename = "TcpSinkApp"
*.server1.app[0].localPort = 1000

# UDP Traffic: client2 -> server2
*.client2.numApps = 1
*.client2.app[0].typename = "UdpBasicApp"
*.client2.app[0].destAddresses = "server2"
*.client2.app[0].destPort = 2000
*.client2.app[0].messageLength = 1000B
*.client2.app[0].sendInterval = 0.01s
*.client2.app[0].startTime = 15s

*.server2.numApps = 1
*.server2.app[0].typename = "UdpSink"
*.server2.app[0].localPort = 2000

# Data Recording Configuration
**.result-recording-modes = all
**.scalar-recording = true
**.vector-recording = true

[Config RIP_Routing]
description = "Dynamic Routing using RIPv2"

# 1. Configurator: No static core routes, but KEEP subnet and default routes
*.configurator.addStaticRoutes = false
*.configurator.addSubnetRoutes = true
*.configurator.addDefaultRoutes = true 

# 2. Enable RIP on core routers
*.r*.hasRip = true
*.r*.rip.startupTime = uniform(0s, 1s)

[Config QoS_Priority]
extends = RIP_Routing
description = "QoS: Priority Queueing for UDP"

# 1. Bottleneck Queue Configuration (r2 -> r5)
*.r2.eth[2].queue.typename = "PriorityQueue"
*.r2.eth[2].queue.numQueues = 2

# 2. Traffic Classification (INET 4.x Native)
*.r2.eth[2].queue.classifier.typename = "ContentBasedClassifier"
*.r2.eth[2].queue.classifier.packetFilters = ["*Udp*", "*"]
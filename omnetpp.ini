# ============================================================
#  omnetpp.ini — Advanced Networks Course Project
#  Implemented parts : 
#  Part I  – Network Architecture  (@3boudi, @mamouneabdelli, @midouuk)
#  Part II – TCP Analysis          (@Yehia-Bou-lahia)
#  Part II – UDP Analysis          (@abdenourounas)
#  Part IV – Advanced Technologies (@Sidali-Djeghbal)

# ============================================================
# [General]  — FROZEN after Part I approval, do not modify
# ============================================================
[General]
network          = src.BasicNetwork
sim-time-limit   = 400s
seed-set         = 0

output-scalar-file = results/${configname}-${runnumber}.sca
output-vector-file = results/${configname}-${runnumber}.vec

# Link-level queue and UDP receive vectors (Part I baseline)
**.eth[*].queue.queueLength:vector = true
**.app[*].rcvdPk:vector            = true

# IPv6-only topology
*.configurator.addStaticRoutes  = true
*.configurator.addDefaultRoutes = true
*.configurator.addSubnetRoutes  = true

**.hasIpv6 = true
**.hasIpv4 = false

# Prevent accidental multi-protocol routing when configs extend each other.
# Individual [Config] sections explicitly enable one routing daemon.
*.r*.hasRip  = false
*.r*.hasOspf = false

**.tcp.typename          = "Tcp"
**.tcp.tcpAlgorithmClass = "TcpReno"   # global default; overridden per config

[Config RIPng]
description = "Dynamic routing with RIPng (Distance-Vector, IPv6)"
*.r*.rip.routingTableModule = "^.ipv6.routingTable"

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip              = true
*.r*.hasOspf             = false
*.r*.rip.mode            = "RIPng"
*.r*.rip.updateInterval  = 30s
*.r*.rip.routeExpiryTime = 180s
*.r*.rip.routePurgeTime  = 120s



[Config OSPFv3]

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip  = false
*.r*.hasOspf = true

# 🔥 هذا هو الإصلاح
*.r*.ospf.routingTableModule = "^.ipv6.routingTable"

*.r*.ospf.ospfConfig         = xmldoc("ospfv3_config.xml")
*.r*.ospf.helloInterval      = 10s
*.r*.ospf.deadInterval       = 40s
*.r*.ospf.retransmitInterval = 5s


# ============================================================
# [Config Part_II_Base]  — Foundation for all Part II configs
# used by Part II; do NOT extend from [General] directly.
# ============================================================
[Config Part_II_Base]
description = "Part II Foundation: TCP/UDP apps on RIPng infrastructure"
extends = RIPng

*.r*.rip.routingTableModule = "^.ipv6.routingTable"

# ── Router Queues (Packet loss & congestion analysis) ──
**.eth[*].queue.typename         = "DropTailQueue"
**.eth[*].queue.packetCapacity   = 50

# ── TCP: client1 → server1  (port 1000) ────────────────────
*.client1.numApps               = 1
*.client1.app[0].typename       = "TcpSessionApp"
*.client1.app[0].connectAddress = "server1"
*.client1.app[0].connectPort    = 1000
*.client1.app[0].tOpen          = 50s
*.client1.app[0].tSend          = 51s
*.client1.app[0].tClose         = 350s
*.client1.app[0].sendBytes      = 10MB     # default; individual configs override

*.server1.numApps               = 1
*.server1.app[0].typename       = "TcpSinkApp"
*.server1.app[0].localPort      = 1000

# ── UDP: client2 → server2  (port 2000) ────────────────────
*.client2.numApps               = 1
*.client2.app[0].typename       = "UdpBasicApp"
*.client2.app[0].destAddresses  = "server2"
*.client2.app[0].destPort       = 2000
*.client2.app[0].startTime      = 50s
*.client2.app[0].messageLength  = 1000B
*.client2.app[0].sendInterval   = 0.01s   # default; individual configs override

*.server2.numApps               = 1
*.server2.app[0].typename       = "UdpSink"
*.server2.app[0].localPort      = 2000

# ── Transport metric recording ──────────────
# Core TCP vectors
**.cwnd:vector              = true
**.rtt:vector               = true
# Retransmission / segment counters (required for loss % calculation)
**.retransmittedBytes:vector = true
**.segsOut:vector            = true
**.segsIn:vector             = true
# UDP drop counter (required for UDP loss % calculation)
**.app[*].packetsDropped:vector = true

# End-to-end delay / jitter (used mainly by UdpBasicApp + UdpSink)
**.app[*].endToEndDelay:vector = true
**.app[*].jitter:vector        = true


# ============================================================
# Part II – TCP Scenarios  (@Yehia-Bou-lahia)
# ============================================================

# ===========================================================
# [Config TCP_Reno_Baseline]
#   TCP Reno — 100 MB file transfer, 10 Mbps bottleneck, UDP disabled.
#   Primary baseline for TCP algorithm comparison and cwnd analysis.
[Config TCP_Reno_Baseline]
description = "TCP Reno: 100 MB file transfer at 10 Mbps bottleneck (baseline)"
extends = Part_II_Base

# Override RIPng with static routes for reliable baseline testing
*.configurator.addStaticRoutes  = true
*.configurator.addDefaultRoutes = true

# Ensure no dynamic routing daemon is running in this baseline.
*.r*.hasRip  = false
*.r*.hasOspf = false

**.tcp.tcpAlgorithmClass   = "TcpReno"   # explicit — no implicit Global inheritance
*.client1.app[0].sendBytes = 100MB       # override 10 MB default from Part_II_Base
*.client2.numApps          = 0           # UDP off: TCP-only isolated test

# Extend timing far beyond any initialization as safety margin
*.client1.app[0].tOpen     = 30s
*.client1.app[0].tSend     = 31s
*.client1.app[0].tClose    = 350s

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config TCP_Cubic_Compare]
#   TCP CUBIC — identical conditions to TCP_Reno_Baseline.
#   Compare cwnd growth curve and throughput against Reno.
# ===========================================================
[Config TCP_Cubic_Compare]
description = "TCP CUBIC: 100 MB file transfer (algorithm comparison vs Reno)"
extends = Part_II_Base

# Keep routing consistent across TCP algorithm comparisons: static routes, no RIPng.
*.configurator.addStaticRoutes  = true
*.configurator.addDefaultRoutes = true
*.r*.hasRip  = false
*.r*.hasOspf = false

**.tcp.tcpAlgorithmClass   = "TcpCubic"
*.client1.app[0].sendBytes = 100MB
*.client2.numApps          = 0           # UDP off: TCP-only isolated test

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config TCP_Congestion_1Mbps]  — Bonus / stress-test
#   TCP Reno under severe bottleneck (1 Mbps instead of 10 Mbps).
#   analysis of extreme congestion window collapse.
# ===========================================================
[Config TCP_Congestion_1Mbps]
description = "TCP Reno stress-test: bottleneck reduced to 1 Mbps"
extends = Part_II_Base

# Static-route baseline for reproducible congestion window dynamics.
*.configurator.addStaticRoutes  = true
*.configurator.addDefaultRoutes = true
*.r*.hasRip  = false
*.r*.hasOspf = false

**.tcp.tcpAlgorithmClass   = "TcpReno"
*.client1.app[0].sendBytes = 100MB
*.client2.numApps          = 0

# Constrain the R2↔R5 bottleneck link to 1 Mbps
**.r2.eth[2].datarate = 1Mbps

**.scalar-recording = true
**.vector-recording = true


# ============================================================
# Part II – UDP Scenarios  (@abdenourounas)
# ============================================================

[Config UDP_Streaming]
description = "UDP: Real-time streaming 1 000 pps ≈ 8 Mbps (per team02.md)"
extends = Part_II_Base

*.client1.numApps             = 0      # TCP disabled — UDP only
*.client2.app[0].sendInterval = 1ms    # 1 000 pkt/s ≈ 8 Mbps
*.client2.app[0].messageLength = 1000B

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config UDP_Streaming_Light] — @abdenourounas
#   UDP 5 ms interval = 200 pps ≈ 1.6 Mbps (comparison variant)
#   Reference results: Loss=2.365%, Delay=24.354 ms, Jitter=0.590 ms
# ===========================================================
[Config UDP_Streaming_Light]
description = "UDP: Light streaming 200 pps ≈ 1.6 Mbps (comparison)"
extends = Part_II_Base

*.client1.numApps              = 0      # TCP disabled — UDP only
*.client2.app[0].sendInterval  = 5ms    # 200 pkt/s ≈ 1.6 Mbps
*.client2.app[0].messageLength = 1000B

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config TCP_UDP_Competing] — @abdenourounas
#   TCP 100 MB + UDP 800 kbps competing at bottleneck.
#   UDP starts 5 s after TCP to capture TCP's initial ramp-up.
#   Reference results: UDP Loss=0.032%, Delay=24.356 ms, Jitter=0.642 ms
# ===========================================================
[Config TCP_UDP_Competing]
extends = Part_II_Base

# ✅ bottleneck الحقيقي
*.r5.eth[1].datarate = 100kbps
*.r5.eth[1].queue.packetCapacity = 5

# 🔥 UDP heavy traffic
*.client2.app[0].sendInterval = 0.0005s
*.client2.app[0].messageLength = 1000B

# TCP
*.client1.app[0].sendBytes = 100MB
*.client1.app[0].tOpen = 50s

# timing
*.client2.app[0].startTime = 60s

# ===========================================================
# [Config TCP_UDP_Competing_OSPFv3]
#   Same exact Part II traffic, but on OSPFv3 instead of RIPng.
#   This enables clean routing-protocol comparisons without
#   duplicating transport/app settings.
# ===========================================================
[Config TCP_UDP_Competing_OSPFv3]
description = "TCP and UDP competing (OSPFv3 routing)"
extends = TCP_UDP_Competing

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip                 = false
*.r*.hasOspf                = true
*.r*.ospf.ospfConfig         = xmldoc("ospfv3_config.xml")
*.r*.ospf.helloInterval      = 10s
*.r*.ospf.deadInterval       = 40s
*.r*.ospf.retransmitInterval = 5s

# ===========================================================
# [Config UDP_Heavy_Load] — @abdenourounas
#   UDP 1 ms interval = 1 000 pps ≈ 8 Mbps — bottleneck stress test.
#   Reference results: Loss=3.928%, Delay=24.355 ms, Jitter=0.579 ms
# ===========================================================
[Config UDP_Heavy_Load]
description = "UDP Heavy Load: 1 000 pps pushing bottleneck to limit"
extends = Part_II_Base

*.client1.numApps              = 0      # TCP disabled — UDP only
*.client2.app[0].sendInterval  = 1ms    # 1 000 pkt/s ≈ 8 Mbps
*.client2.app[0].messageLength = 1000B

**.scalar-recording = true
**.vector-recording = true

# ============================================================
# Part IV – Advanced Technologies (Option A - @Sidali-djeghbal)
# ============================================================

# ===========================================================
# [Config IPv6_Advanced_QoS] — @Sidali-djeghbal
#   Demonstrates IPv6 Advanced Features:
#   1. Auto-configuration (Active globally via Ipv6FlatNetworkConfigurator)
#   2. QoS with IPv6 (Traffic Class / DiffServ tagging)
#
#   Takes the competing scenario and applies IPv6 Differentiated Services.
#   UDP is tagged as Expedited Forwarding (DSCP 46) prioritizing it over TCP.
# ===========================================================
[Config IPv6_Advanced_QoS]
description = "Part IV (Option A): IPv6 Advanced Features - QoS & Auto-config"
extends = TCP_UDP_Competing

# 1. Tag UDP real-time streaming with Expedited Forwarding (DSCP 46)
#    This sets the IPv6 Traffic Class header to 0xB8 (46 << 2)
*.client2.app[0].dscp = 46

# 2. Tag TCP bulk transfer with Best Effort (DSCP 0 - default)
*.client1.app[0].dscp = 0

# QoS على bottleneck الحقيقي (r5)
*.r5.eth[1].queue.typename = "PriorityQueue"
*.r5.eth[1].queue.numQueues = 2

*.r5.eth[1].queue.classifier.typename = "ContentBasedClassifier"
*.r5.eth[1].queue.classifier.packetFilters = ["udp", "*"]

*.r5.eth[1].queue.scheduler.typename = "PriorityScheduler"

# UDP (high priority)
*.r5.eth[1].queue.queue[0].typename = "DropTailQueue"
*.r5.eth[1].queue.queue[0].packetCapacity = 50

# TCP (low priority)
*.r5.eth[1].queue.queue[1].typename = "DropTailQueue"
*.r5.eth[1].queue.queue[1].packetCapacity = 50

# Record IPv6 Traffic Class / DSCP to prove QoS is working
**.ipv6.dscp:vector = true
**.ipv6.trafficClass:vector = true

# ===========================================================
# [Config IPv6_Advanced_QoS_OSPFv3]
#   Part IV scenario reused on OSPFv3 routing.
# ===========================================================
[Config IPv6_Advanced_QoS_OSPFv3]

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip  = false
*.r*.hasOspf = true

# 🔥 الحل النهائي
*.r*.ospf.routingTableModule = "^.ipv6.routingTable"

*.r*.ospf.ospfConfig         = xmldoc("ospfv3_config.xml")
*.r*.ospf.helloInterval      = 10s
*.r*.ospf.deadInterval       = 40s
*.r*.ospf.retransmitInterval = 5s


[Config QoS_DiffServ_WFQ]
extends = TCP_UDP_Competing

*.r5.eth[1].queue.typename = "PriorityQueue"
*.r5.eth[1].queue.numQueues = 2

*.r5.eth[1].queue.packetCapacity = 50   # 🔥 مهم

*.r5.eth[1].queue.classifier.typename = "ContentBasedClassifier"
*.r5.eth[1].queue.classifier.packetFilters = ["udp", "*"]

*.r5.eth[1].queue.scheduler.typename = "PriorityScheduler"

# UDP
*.r5.eth[1].queue.queue[0].typename = "DropTailQueue"
*.r5.eth[1].queue.queue[0].packetCapacity = 20

# TCP
*.r5.eth[1].queue.queue[1].typename = "DropTailQueue"
*.r5.eth[1].queue.queue[1].packetCapacity = 30
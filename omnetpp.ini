# ============================================================
#  omnetpp.ini — Part I: Network Architecture Design
#  Advanced Networks Course Project — OMNeT++ / INET Framework
#  Team: @3boudi, @mamouneabdelli, @midouuk
#
#  Configs defined here:
#    [General]           — Infrastructure-only shared settings (Part I owns this)
#    [Config RIPng]      — RIPng dynamic routing experiment
#    [Config OSPFv3]     — OSPFv3 dynamic routing experiment
#    [Config Part_II_Base] — Foundation for Part II team (TCP/UDP apps)
#
#  How to run:
#    IDE:  Right-click omnetpp.ini → Run As → OMNeT++ Simulation
#    CLI:  opp_run -u Cmdenv -c RIPng omnetpp.ini
#          opp_run -u Cmdenv -c OSPFv3 omnetpp.ini
#
#  IMPORTANT for downstream teams:
#    - DO NOT modify [General] or [Config RIPng] / [Config OSPFv3]
#    - Part II: extend [Config Part_II_Base] for transport testing
#    - Part III: extend Part II configs for QoS
#    - Part IV: extend Part II/III configs for advanced features
#    - Part V: coordinate all configs for final analysis
# ============================================================


# ===========================================================
# [General] — INFRASTRUCTURE ONLY (Part I owns — do not modify)
#   No application-level config here. IPv6 + output only.
# ===========================================================
[General]
network          = src.BasicNetwork
sim-time-limit   = 100s
seed-set         = 0

# ── Output ──────────────────────────────────────────────────
output-scalar-file = results/${configname}-${runnumber}.sca
output-vector-file = results/${configname}-${runnumber}.vec

# ── Vector recording (OMNeT++ 6.x) ──────────────────────────
**.eth[*].queue.queueLength:vector = true
**.udpApp[*].rcvdPk:vector         = true

# ── IPv6 Configuration ──────────────────────────────────────
*.configurator.addStaticRoutes   = true
*.configurator.addDefaultRoutes  = true
*.configurator.addSubnetRoutes   = true

**.hasIpv6 = true
**.hasIpv4 = false

# ── TCP Stack baseline ───────────────────────────────────────
**.tcp.typename          = "Tcp"
**.tcp.tcpAlgorithmClass = "TcpReno"


# ===========================================================
# [Config RIPng] — RIPng (RFC 2080) for IPv6
#
#  FIX #1: **.router* → **.r[*] to match actual names r1..r6
#  FIX #4: Removed non-existent routeAdded/routeDeleted signals
# ===========================================================
[Config RIPng]
description = "Dynamic routing with RIPng (Distance-Vector, IPv6)"

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

**.r[*].hasRip           = true
**.r[*].rip.mode         = "RIPng"
**.r[*].rip.updateInterval   = 30s
**.r[*].rip.routeExpiryTime  = 180s
**.r[*].rip.routePurgeTime   = 120s


# ===========================================================
# [Config OSPFv3] — OSPFv3 (RFC 5340) for IPv6
#
#  FIX #2: **.router* → **.r[*] to match actual names r1..r6
#  FIX #5: Removed non-existent numLsa signal
#  FIX #6: ospfv3_config.xml now exists — xmldoc() reference restored
# ===========================================================
[Config OSPFv3]
description = "Dynamic routing with OSPFv3 (Link-State, IPv6)"

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

**.r[*].hasOspf                  = true
**.r[*].ospf.ospfConfig         = xmldoc("ospfv3_config.xml")
**.r[*].ospf.helloInterval       = 10s
**.r[*].ospf.deadInterval        = 40s
**.r[*].ospf.retransmitInterval  = 5s


# ===========================================================
# [Config Part_II_Base] — Foundation for Part II Team
#
#  FIX #3: TCP/UDP apps moved OUT of [General] into here.
#  FIX #7: Bottleneck_Study deleted (belongs to Part III).
#
#  Part II usage:
#    [Config TCP_Cubic_Test]
#    extends = Part_II_Base
#    **.tcp.tcpAlgorithmClass = "TcpCubic"
# ===========================================================
[Config Part_II_Base]
description = "Part II Foundation: TCP/UDP apps for transport protocol testing"
extends = RIPng

# ── TCP: client1 → server1 (port 1000) ──────────────────────
*.client1.numApps                = 1
*.client1.app[0].typename        = "TcpSessionApp"
*.client1.app[0].connectAddress  = "server1"
*.client1.app[0].connectPort     = 1000
*.client1.app[0].tOpen           = 1s
*.client1.app[0].tSend           = 2s
*.client1.app[0].tClose          = 90s
*.client1.app[0].sendBytes       = 10MB

*.server1.numApps                = 1
*.server1.app[0].typename        = "TcpSinkApp"
*.server1.app[0].localPort       = 1000

# ── UDP: client2 → server2 (port 2000) ──────────────────────
*.client2.numApps                = 1
*.client2.app[0].typename        = "UdpBasicApp"
*.client2.app[0].destAddresses   = "server2"
*.client2.app[0].destPort        = 2000
*.client2.app[0].messageLength   = 1000B
*.client2.app[0].sendInterval    = 0.01s

*.server2.numApps                = 1
*.server2.app[0].typename        = "UdpSink"
*.server2.app[0].localPort       = 2000

# ── Transport recording vectors ──────────────────────────────
**.tcp.cwnd:vector = true
**.tcp.rtt:vector  = true

# ===========================================================
# [Config TCP_Reno_Baseline] — Team 2: @abdenourounas
#   TCP Reno baseline: 100MB file transfer at bottleneck
# ===========================================================
[Config TCP_Reno_Baseline]
description = "TCP Reno: 100MB file transfer at 10 Mbps bottleneck"
extends = Part_II_Base

*.client1.app[0].sendBytes = 100MB
*.client2.numApps = 0           # UDP disabled — TCP only

**.tcp.tcpAlgorithmClass         = "TcpReno"
**.tcp.cwnd:vector               = true
**.tcp.rtt:vector                = true
**.tcp.retransmittedBytes:vector = true


# ===========================================================
# [Config TCP_Cubic_Compare] — Team 2: @abdenourounas
#   TCP CUBIC vs Reno comparison
# ===========================================================
[Config TCP_Cubic_Compare]
description = "TCP CUBIC: 100MB file transfer at 10 Mbps bottleneck"
extends = Part_II_Base

*.client1.app[0].sendBytes = 100MB
*.client2.numApps = 0           # UDP disabled — TCP only

**.tcp.tcpAlgorithmClass         = "TcpCubic"
**.tcp.cwnd:vector               = true
**.tcp.rtt:vector                = true
**.tcp.retransmittedBytes:vector = true


# ===========================================================
# [Config UDP_Streaming] — Team 2: @abdenourounas
#   UDP real-time streaming: 5ms interval ≈ 1.6 Mbps
# ===========================================================
[Config UDP_Streaming]
description = "UDP: Real-time streaming simulation"
extends = Part_II_Base

*.client1.numApps = 0           # TCP disabled — UDP only

*.client2.app[0].sendInterval  = 5ms
*.client2.app[0].messageLength = 1000B

**.scalar-recording = true
**.vector-recording = true


# ===========================================================
# [Config TCP_UDP_Competing] — Team 2: @abdenourounas
#   TCP and UDP competing at the bottleneck
# ===========================================================
[Config TCP_UDP_Competing]
description = "TCP and UDP competing for bottleneck bandwidth"
extends = Part_II_Base

*.client1.app[0].sendBytes     = 100MB
*.client1.app[0].tOpen         = 1s

*.client2.app[0].sendInterval  = 10ms    # 800 kbps UDP
*.client2.app[0].messageLength = 1000B
*.client2.app[0].startTime     = 5s      # Start UDP after TCP is running

**.scalar-recording = true
**.vector-recording = true


# ===========================================================
# [Config UDP_Heavy_Load] — Team 2: @abdenourounas
#   UDP under heavy load: 1ms interval ≈ 8 Mbps
# ===========================================================
[Config UDP_Heavy_Load]
description = "UDP Heavy Load: 1000 pps pushing bottleneck limit"
extends = Part_II_Base

*.client1.numApps = 0           # TCP disabled — UDP only

*.client2.app[0].sendInterval  = 1ms     # 1000 pkt/s ≈ 8 Mbps
*.client2.app[0].messageLength = 1000B

**.scalar-recording = true
**.vector-recording = true
# ============================================================
#  omnetpp.ini — Part I: Network Architecture Design
#  Advanced Networks Course Project — OMNeT++ / INET Framework
#  Team: @3boudi, @mamouneabdelli, @midouuk
#
#  Configs defined here:
#    [General]           — Baseline shared settings
#    [Config RIPng]      — RIPng dynamic routing experiment
#    [Config OSPFv3]     — OSPFv3 dynamic routing experiment
#    [Config Bottleneck_Study] — Parameter sweep on bottleneck BW
#
#  How to run:
#    IDE:  Right-click omnetpp.ini → Run As → OMNeT++ Simulation
#          then select a [Config] from the dialog.
#    CLI:  opp_run -u Cmdenv -c RIPng omnetpp.ini
#          opp_run -u Cmdenv -c OSPFv3 omnetpp.ini
# ============================================================


# ===========================================================
# [General] — Applied to ALL configs (inherited)
# ===========================================================
[General]
network          = src.BasicNetwork
sim-time-limit   = 100s
seed-set         = 0          # reproducible runs

# ── Output / Recording ──────────────────────────────────────
# Record all scalar and vector statistics
output-scalar-file = results/${configname}-${runnumber}.sca
output-vector-file = results/${configname}-${runnumber}.vec

# Enable recording of key vectors for analysis
# OMNeT++ 6.x vector recording (record-interval was removed in v6)
**.tcp.snd_cwnd:vector                 = true    # TCP congestion window
**.tcp.rcvd_bytes:vector               = true
**.ppp[*].queue.queueLength:vector     = true    # queue depth at bottleneck
**.ppp[*].queue.queueLength:vector            = true
**.udpApp[*].rcvdPk:vector             = true

# ── IPv6 Configuration ──────────────────────────────────────
# Use the flat configurator; it assigns 2001:db8::/32 subnets
# automatically to every link and gives each interface a
# global unicast address. No manual address assignment needed.
*.configurator.addStaticRoutes   = true
*.configurator.addDefaultRoutes  = true
*.configurator.addSubnetRoutes   = true

# Force IPv6 stack on every node
**.hasIpv6 = true
**.hasIpv4 = false

# ── TCP Stack ───────────────────────────────────────────────
**.tcp.typename          = "Tcp"
**.tcp.tcpAlgorithmClass = "TcpReno"   # baseline; Part II can change this

# ── TCP Application: client1 → server1 (port 1000) ─────────
*.client1.numApps = 1
*.client1.app[0].typename        = "TcpSessionApp"
*.client1.app[0].connectAddress  = "server1"
*.client1.app[0].connectPort     = 1000
*.client1.app[0].tOpen           = 1s
*.client1.app[0].tSend           = 2s
*.client1.app[0].tClose          = 90s
*.client1.app[0].sendBytes       = 10MB

*.server1.numApps = 1
*.server1.app[0].typename  = "TcpSinkApp"
*.server1.app[0].localPort = 1000

# ── UDP Application: client2 → server2 (port 2000) ─────────
*.client2.numApps = 1
*.client2.app[0].typename       = "UdpBasicApp"
*.client2.app[0].destAddresses  = "server2"
*.client2.app[0].destPort       = 2000
*.client2.app[0].messageLength  = 1000B
*.client2.app[0].sendInterval   = 0.01s   # 100 pkts/s = ~800 kbps

*.server2.numApps = 1
*.server2.app[0].typename   = "UdpSink"
*.server2.app[0].localPort  = 2000


# ===========================================================
# [Config RIPng] — Experiment: Routing Information Protocol
#                  for IPv6 (RIPng, RFC 2080)
# ===========================================================
[Config RIPng]
description = "Dynamic routing with RIPng (Distance-Vector, IPv6)"

# Override auto static routes — let RIPng build the table
*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

# Enable RIPng on every router
**.router*.hasRip    = true
**.router*.rip.mode  = "RIPng"

# RIPng timers (RFC 2080 defaults)
**.router*.rip.updateInterval        = 30s
**.router*.rip.routeExpiryTime       = 180s
**.router*.rip.routePurgeTime        = 120s

# Record routing table size over time to measure convergence
**.router*.routingTable.routeAdded:vector   = true
**.router*.routingTable.routeDeleted:vector = true


# ===========================================================
# [Config OSPFv3] — Experiment: Open Shortest Path First v3
#                   (OSPFv3, RFC 5340) for IPv6
# ===========================================================
[Config OSPFv3]
description = "Dynamic routing with OSPFv3 (Link-State, IPv6)"

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

# Enable OSPFv3 on every router in Area 0 (backbone)
**.router*.hasOspf     = true
**.router*.ospf.ospfConfig = xmldoc("ospfv3_config.xml")

# OSPFv3 timers
**.router*.ospf.helloInterval    = 10s
**.router*.ospf.deadInterval     = 40s
**.router*.ospf.retransmitInterval = 5s

# Record LSA counts and neighbour state changes
**.router*.ospf.numLsa:vector = true


# ===========================================================
# [Config Bottleneck_Study] — Parameter Sweep
#   Runs simulation 3 times with different bottleneck speeds.
#   OMNeT++ auto-generates 3 result files (one per datarate).
# ===========================================================
[Config Bottleneck_Study]
description = "Bottleneck bandwidth sweep: 1Mbps / 5Mbps / 10Mbps"
extends = RIPng     # inherit RIPng routing for this study

# Iterator — OMNeT++ will run this config once per value
*.BasicNetwork.r2.ethg[2].channel.datarate = ${BW=10Mbps, 100Mbps, 1000Mbps}
*.BasicNetwork.r5.ethg[1].channel.datarate = ${BW}

# Tag result files with the current BW value
output-scalar-file = results/bottleneck-${BW}-${runnumber}.sca
output-vector-file = results/bottleneck-${BW}-${runnumber}.vec
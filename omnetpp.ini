# ============================================================
#  omnetpp.ini — Advanced Networks Course Project
#
#  Part I  – Network Architecture  (@3boudi, @mamouneabdelli, @midouuk)
#  Part II – TCP Analysis          (@Yehia-Bou-lahia)
#  Part II – UDP Analysis          (@abdenourounas)
#
#  Config Index
#  ─────────────────────────────────────────────────────────
#  ── Part I  (FROZEN — do not modify) ──
#    [RIPng]                  RIPng distance-vector routing
#    [OSPFv3]                 OSPFv3 link-state routing
#
#  ── Part II – Foundation ──
#    [Part_II_Base]           TCP + UDP apps on RIPng infrastructure
#
#  ── Part II – TCP  (@Yehia-Bou-lahia) ──
#    [TCP_Reno_Baseline]      TCP Reno, 100 MB, UDP off   ← required
#    [TCP_Cubic_Compare]      TCP CUBIC, 100 MB, UDP off  ← required
#    [TCP_Congestion_1Mbps]   TCP Reno, 1 Mbps bottleneck (bonus stress-test)
#
#  ── Part II – UDP  (@abdenourounas) ──
#    [UDP_Streaming]          1 ms = 1 000 pps ≈ 8 Mbps  ← required
#    [UDP_Streaming_Light]    5 ms =   200 pps ≈ 1.6 Mbps (comparison)
#    [TCP_UDP_Competing]      TCP 100 MB + UDP 800 kbps   ← required
#    [UDP_Heavy_Load]         UDP stress test 1 000 pps   ← required
#
#  ── Part III – QoS  (@Team03) ──
#    [QoS_DiffServ_WRR]        DiffServ with WRR fairness
#    [QoS_DiffServ_WRR_OSPFv3] DiffServ WRR on OSPFv3
#    [QoS_IntServ_RSVP]        IntServ emulation (strict priority)
#    [QoS_IntServ_RSVP_OSPFv3] IntServ emulation on OSPFv3
#
#  ── Part IV – Advanced Tech  (@Sidali-djeghbal) ──
#    [IPv6_Advanced_QoS]       IPv6 QoS with DSCP + WRR
#    [IPv6_Advanced_QoS_OSPFv3] IPv6 QoS on OSPFv3
# ============================================================

# ============================================================
# [General]  — FROZEN after Part I approval
# ============================================================
[General]
network          = src.BasicNetwork
sim-time-limit   = 400s
seed-set         = 0

output-scalar-file = results/${configname}-${runnumber}.sca
output-vector-file = results/${configname}-${runnumber}.vec

# Link-level queue and UDP receive vectors (Part I baseline)
**.eth[*].queue.queueLength:vector = true
**.udpApp[*].rcvdPk:vector         = true

# IPv6-only topology
*.configurator.addStaticRoutes  = true
*.configurator.addDefaultRoutes = true
*.configurator.addSubnetRoutes  = true

**.hasIpv6 = true
**.hasIpv4 = false

# OSPFv3 (INET 4.6) requires per-router XML selectors for the splitter.
*.r1.ospf.ospfv3Splitter.ospfv3RoutingConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r1']/Routing6/OSPFv3")
*.r2.ospf.ospfv3Splitter.ospfv3RoutingConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r2']/Routing6/OSPFv3")
*.r3.ospf.ospfv3Splitter.ospfv3RoutingConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r3']/Routing6/OSPFv3")
*.r4.ospf.ospfv3Splitter.ospfv3RoutingConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r4']/Routing6/OSPFv3")
*.r5.ospf.ospfv3Splitter.ospfv3RoutingConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r5']/Routing6/OSPFv3")
*.r6.ospf.ospfv3Splitter.ospfv3RoutingConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r6']/Routing6/OSPFv3")

*.r1.ospf.ospfv3Splitter.ospfv3IntConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r1']/Interfaces")
*.r2.ospf.ospfv3Splitter.ospfv3IntConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r2']/Interfaces")
*.r3.ospf.ospfv3Splitter.ospfv3IntConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r3']/Interfaces")
*.r4.ospf.ospfv3Splitter.ospfv3IntConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r4']/Interfaces")
*.r5.ospf.ospfv3Splitter.ospfv3IntConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r5']/Interfaces")
*.r6.ospf.ospfv3Splitter.ospfv3IntConfig = xmldoc("ospfv3_splitter_config.xml", "Devices/Router[@id='r6']/Interfaces")

**.tcp.typename          = "Tcp"
**.tcp.tcpAlgorithmClass = "TcpReno"   # global default; overridden per config

# ============================================================
# [Config RIPng]  — FROZEN (Part I)
# ============================================================
[Config RIPng]
description = "Dynamic routing with RIPng (Distance-Vector, IPv6)"

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip                  = true
*.r*.hasOspf                 = false
*.r*.rip.mode                = "RIPng"
*.r*.rip.routingTableModule   = "^.ipv6.routingTable"
*.r*.rip.interfaceTableModule = "^.interfaceTable"
*.r*.rip.updateInterval      = 30s
*.r*.rip.routeExpiryTime     = 180s
*.r*.rip.routePurgeTime      = 120s

# ============================================================
# [Config OSPFv3]  — FROZEN (Part I)
# ============================================================
[Config OSPFv3]
description = "Dynamic routing with OSPFv3 (Link-State, IPv6)"

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip                  = false
*.r*.hasOspf                 = true
*.r*.ospf.typename           = "Ospfv3"
*.r*.ospf.interfaceTableModule = "^.interfaceTable"
*.r*.ospf.routingTableModule6 = "^.ipv6.routingTable"
*.r*.ospf.helloInterval      = 10s
*.r*.ospf.deadInterval       = 40s
*.r*.ospf.retransmitInterval = 5s

# ============================================================
# [Config Part_II_Base]  — Foundation for all Part II configs
# Owned by Part II; do NOT extend from [General] directly.
# ============================================================
[Config Part_II_Base]
description = "Part II Foundation: TCP/UDP apps on RIPng infrastructure"
extends = RIPng

# ── Router Queues (Course Req: Packet loss & congestion analysis) ──
**.eth[*].queue.typename         = "DropTailQueue"
**.eth[*].queue.packetCapacity   = 50

# ── TCP: client1 → server1  (port 1000) ────────────────────
*.client1.numApps               = 1
*.client1.app[0].typename       = "TcpSessionApp"
*.client1.app[0].connectAddress = "server1"
*.client1.app[0].connectPort    = 1000
*.client1.app[0].tOpen          = 50s
*.client1.app[0].tSend          = 51s
*.client1.app[0].tClose         = 350s
*.client1.app[0].sendBytes      = 10MB     # default; individual configs override

*.server1.numApps               = 1
*.server1.app[0].typename       = "TcpSinkApp"
*.server1.app[0].localPort      = 1000

# ── UDP: client2 → server2  (port 2000) ────────────────────
*.client2.numApps               = 1
*.client2.app[0].typename       = "UdpBasicApp"
*.client2.app[0].destAddresses  = "server2"
*.client2.app[0].destPort       = 2000
*.client2.app[0].startTime      = 50s
*.client2.app[0].messageLength  = 1000B
*.client2.app[0].sendInterval   = 0.01s   # default; individual configs override

*.server2.numApps               = 1
*.server2.app[0].typename       = "UdpSink"
*.server2.app[0].localPort      = 2000

# ── Transport metric recording (Issue #3 fix) ──────────────
# Core TCP vectors
**.cwnd:vector              = true
**.rtt:vector               = true
# Retransmission / segment counters (required for loss % calculation)
**.retransmittedBytes:vector = true
**.segsOut:vector            = true
**.segsIn:vector             = true
# UDP drop counter (required for UDP loss % calculation)
**.udpApp[*].packetsDropped:vector = true


# ============================================================
# Part II – TCP Scenarios  (@Yehia-Bou-lahia)
# ============================================================

# ===========================================================
# [Config TCP_Reno_Baseline]
#   TCP Reno — 100 MB file transfer, 10 Mbps bottleneck, UDP disabled.
#   Primary baseline for TCP algorithm comparison and cwnd analysis.
[Config TCP_Reno_Baseline]
description = "TCP Reno: 100 MB file transfer at 10 Mbps bottleneck (baseline)"
extends = Part_II_Base

# Override RIPng with static routes for reliable baseline testing
*.configurator.addStaticRoutes  = true
*.configurator.addDefaultRoutes = true

**.tcp.tcpAlgorithmClass   = "TcpReno"   # explicit — no implicit Global inheritance
*.client1.app[0].sendBytes = 100MB       # override 10 MB default from Part_II_Base
*.client2.numApps          = 0           # UDP off: TCP-only isolated test

# Extend timing far beyond any initialization as safety margin
*.client1.app[0].tOpen     = 30s
*.client1.app[0].tSend     = 31s
*.client1.app[0].tClose    = 350s

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config TCP_Cubic_Compare]
#   TCP CUBIC — identical conditions to TCP_Reno_Baseline.
#   Compare cwnd growth curve and throughput against Reno.
# ===========================================================
[Config TCP_Cubic_Compare]
description = "TCP CUBIC: 100 MB file transfer (algorithm comparison vs Reno)"
extends = Part_II_Base

**.tcp.tcpAlgorithmClass   = "TcpCubic"
*.client1.app[0].sendBytes = 100MB
*.client2.numApps          = 0           # UDP off: TCP-only isolated test

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config TCP_Congestion_1Mbps]  — Bonus / stress-test
#   TCP Reno under severe bottleneck (1 Mbps instead of 10 Mbps).
#   analysis of extreme congestion window collapse.
# ===========================================================
[Config TCP_Congestion_1Mbps]
description = "TCP Reno stress-test: bottleneck reduced to 1 Mbps"
extends = Part_II_Base

**.tcp.tcpAlgorithmClass   = "TcpReno"
*.client1.app[0].sendBytes = 100MB
*.client2.numApps          = 0

# Constrain the R2↔R5 bottleneck link to 1 Mbps
**.r2.eth[2].datarate = 1Mbps

**.scalar-recording = true
**.vector-recording = true


# ============================================================
# Part II – UDP Scenarios  (@abdenourounas)
# ============================================================

# ===========================================================
# [Config UDP_Streaming] — @abdenourounas
#   UDP 1 ms interval = 1 000 pps ≈ 8 Mbps 
# ===========================================================
[Config UDP_Streaming]
description = "UDP: Real-time streaming 1 000 pps ≈ 8 Mbps (per team02.md)"
extends = Part_II_Base

*.client1.numApps             = 0      # TCP disabled — UDP only
*.client2.app[0].sendInterval = 1ms    # 1 000 pkt/s ≈ 8 Mbps
*.client2.app[0].messageLength = 1000B

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config UDP_Streaming_Light] — @abdenourounas
#   UDP 5 ms interval = 200 pps ≈ 1.6 Mbps (comparison variant)
#   Reference results: Loss=2.365%, Delay=24.354 ms, Jitter=0.590 ms
# ===========================================================
[Config UDP_Streaming_Light]
description = "UDP: Light streaming 200 pps ≈ 1.6 Mbps (comparison)"
extends = Part_II_Base

*.client1.numApps              = 0      # TCP disabled — UDP only
*.client2.app[0].sendInterval  = 5ms    # 200 pkt/s ≈ 1.6 Mbps
*.client2.app[0].messageLength = 1000B

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config TCP_UDP_Competing] — @abdenourounas
#   TCP 100 MB + UDP 800 kbps competing at bottleneck.
#   UDP starts 5 s after TCP to capture TCP's initial ramp-up.
#   Reference results: UDP Loss=0.032%, Delay=24.356 ms, Jitter=0.642 ms
# ===========================================================
[Config TCP_UDP_Competing]
description = "TCP and UDP competing for bottleneck bandwidth"
extends = Part_II_Base

*.client1.app[0].sendBytes     = 100MB
*.client1.app[0].tOpen         = 50s    # Preserved 50s for RIPng convergence
*.client2.app[0].sendInterval  = 10ms   # 800 kbps UDP
*.client2.app[0].messageLength = 1000B
*.client2.app[0].startTime     = 60s    # Preserved 60s to start UDP after TCP is running

**.scalar-recording = true
**.vector-recording = true

# ===========================================================
# [Config UDP_Heavy_Load] — @abdenourounas
#   UDP 1 ms interval = 1 000 pps ≈ 8 Mbps — bottleneck stress test.
#   Reference results: Loss=3.928%, Delay=24.355 ms, Jitter=0.579 ms
# ===========================================================
[Config UDP_Heavy_Load]
description = "UDP Heavy Load: 1 000 pps pushing bottleneck to limit"
extends = Part_II_Base

*.client1.numApps              = 0      # TCP disabled — UDP only
*.client2.app[0].sendInterval  = 1ms    # 1 000 pkt/s ≈ 8 Mbps
*.client2.app[0].messageLength = 1000B

**.scalar-recording = true
**.vector-recording = true

# ============================================================
# Part III – Quality of Service (QoS) Implementation (@Team03)
# ============================================================

[Config QoS_DiffServ_WRR]
description = "Part III: DiffServ + WRR with deterministic DSCP mapping"
extends = TCP_UDP_Competing

*.client2.app[0].dscp = 46
*.client1.app[0].dscp = 0

*.r2.eth[2].datarate = 100kbps
*.r2.eth[2].queue.typename = "PriorityQueue"
*.r2.eth[2].queue.numQueues = 2
*.r2.eth[2].queue.classifier.typename = "ContentBasedClassifier"
*.r2.eth[2].queue.classifier.packetFilters = ["*UdpBasicApp*", "*"]
*.r2.eth[2].queue.scheduler.typename = "WrrScheduler"
*.r2.eth[2].queue.scheduler.weights = "3 1"
*.r2.eth[2].queue.queue[0].typename = "DropTailQueue"
*.r2.eth[2].queue.queue[0].packetCapacity = 50
*.r2.eth[2].queue.queue[1].typename = "DropTailQueue"
*.r2.eth[2].queue.queue[1].packetCapacity = 50

*.client2.app[0].messageLength = 200B

**.scalar-recording = true
**.vector-recording = true

[Config QoS_DiffServ_WRR_OSPFv3]
description = "Part III: DiffServ + WRR (OSPFv3 routing)"
extends = QoS_DiffServ_WRR

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip                  = false
*.r*.hasOspf                 = true
*.r*.ospf.typename           = "Ospfv3"
*.r*.ospf.interfaceTableModule = "^.interfaceTable"
*.r*.ospf.routingTableModule6 = "^.ipv6.routingTable"
*.r*.ospf.helloInterval      = 10s
*.r*.ospf.deadInterval       = 40s
*.r*.ospf.retransmitInterval = 5s

[Config QoS_IntServ_RSVP]
description = "Part III: IntServ emulation with per-flow strict priority"
extends = TCP_UDP_Competing

*.client2.app[0].dscp = 10
*.client1.app[0].dscp = 0

*.r2.eth[2].datarate = 100kbps
*.r2.eth[2].queue.typename = "PriorityQueue"
*.r2.eth[2].queue.numQueues = 2
*.r2.eth[2].queue.classifier.typename = "ContentBasedClassifier"
*.r2.eth[2].queue.classifier.packetFilters = ["*UdpBasicApp*", "*"]
*.r2.eth[2].queue.scheduler.typename = "PriorityScheduler"
*.r2.eth[2].queue.queue[0].typename = "DropTailQueue"
*.r2.eth[2].queue.queue[0].packetCapacity = 20
*.r2.eth[2].queue.queue[1].typename = "DropTailQueue"
*.r2.eth[2].queue.queue[1].packetCapacity = 30

*.client2.app[0].messageLength = 200B

**.scalar-recording = true
**.vector-recording = true

[Config QoS_IntServ_RSVP_OSPFv3]
description = "Part III: IntServ emulation (OSPFv3 routing)"
extends = QoS_IntServ_RSVP

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip                  = false
*.r*.hasOspf                 = true
*.r*.ospf.typename           = "Ospfv3"
*.r*.ospf.interfaceTableModule = "^.interfaceTable"
*.r*.ospf.routingTableModule6 = "^.ipv6.routingTable"
*.r*.ospf.helloInterval      = 10s
*.r*.ospf.deadInterval       = 40s
*.r*.ospf.retransmitInterval = 5s

# ============================================================
# Part IV – Advanced Technologies (Option A - @Sidali-djeghbal)
# ============================================================

[Config IPv6_Advanced_QoS]
description = "Part IV (Option A): IPv6 Advanced Features - QoS & Auto-config"
extends = TCP_UDP_Competing

*.client2.app[0].dscp = 46
*.client1.app[0].dscp = 0

*.r2.eth[2].queue.typename = "PriorityQueue"
*.r2.eth[2].queue.numQueues = 2
*.r2.eth[2].queue.classifier.typename = "ContentBasedClassifier"
*.r2.eth[2].queue.classifier.packetFilters = ["*UdpBasicApp*", "*"]
*.r2.eth[2].queue.scheduler.typename = "WrrScheduler"
*.r2.eth[2].queue.scheduler.weights = "3 1"
*.r2.eth[2].queue.queue[0].typename = "DropTailQueue"
*.r2.eth[2].queue.queue[0].packetCapacity = 50
*.r2.eth[2].queue.queue[1].typename = "DropTailQueue"
*.r2.eth[2].queue.queue[1].packetCapacity = 50

**.ipv6.dscp:vector = true
**.ipv6.trafficClass:vector = true

**.scalar-recording = true
**.vector-recording = true

[Config IPv6_Advanced_QoS_OSPFv3]
description = "Part IV (Option A): IPv6 QoS & Auto-config (OSPFv3 routing)"
extends = IPv6_Advanced_QoS

*.configurator.addStaticRoutes  = false
*.configurator.addDefaultRoutes = false

*.r*.hasRip                  = false
*.r*.hasOspf                 = true
*.r*.ospf.typename           = "Ospfv3"
*.r*.ospf.interfaceTableModule = "^.interfaceTable"
*.r*.ospf.routingTableModule6 = "^.ipv6.routingTable"
*.r*.ospf.helloInterval      = 10s
*.r*.ospf.deadInterval       = 40s
*.r*.ospf.retransmitInterval = 5s
